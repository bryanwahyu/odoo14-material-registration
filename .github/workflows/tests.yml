name: Odoo 14 Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: odoo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout module
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libldap2-dev libsasl2-dev libxml2-dev libxslt1-dev libjpeg-dev

      - name: Checkout Odoo 14
        uses: actions/checkout@v4
        with:
          repository: odoo/odoo
          ref: '14.0'
          fetch-depth: 1
          path: odoo

      - name: Install Odoo requirements
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r odoo/requirements.txt
          pip install -e odoo

      - name: Run module tests
        run: |
          odoo/odoo-bin \
            -d odoo \
            --db_host=localhost --db_port=5432 --db_user=odoo --db_password=odoo \
            --addons-path=odoo/addons,repo \
            -i material_registration \
            --test-enable --stop-after-init --log-level=test
